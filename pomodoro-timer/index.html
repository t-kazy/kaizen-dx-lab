<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍅 Pomodoro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ページ全体 = ウィジェット本体 */
    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow: hidden;
      transition: background 0.4s;
      /* ブラウザの最小サイズのヒント */
      min-width: 180px;
      min-height: 220px;
    }

    body.mode-work  { background: #1e1e2e; }
    body.mode-break { background: #1e2e2e; }
    body.mode-long  { background: #1e1e2a; }

    /* ===== モードバー（上部） ===== */
    .mode-bar {
      display: flex;
      background: rgba(0,0,0,0.25);
      flex-shrink: 0;
    }

    .mode-tab {
      flex: 1;
      padding: 5px 2px;
      border: none;
      background: transparent;
      color: rgba(205,214,244,0.35);
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .mode-tab.active {
      color: #cdd6f4;
      background: rgba(255,255,255,0.08);
    }

    .mode-tab:hover:not(.active) { color: rgba(205,214,244,0.7); }

    /* ===== タイマーエリア（中央・伸縮） ===== */
    .timer-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 6px;
      gap: 6px;
      min-height: 0;
    }

    /* 円形タイマー：親に合わせて縮む */
    .ring-wrap {
      position: relative;
      /* 親の幅・高さの小さい方に合わせて正方形に */
      width: min(calc(100vw - 16px), calc(100vh - 90px));
      height: min(calc(100vw - 16px), calc(100vh - 90px));
      max-width: 140px;
      max-height: 140px;
      flex-shrink: 1;
    }

    .ring-svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .ring-track {
      fill: none;
      stroke: rgba(205,214,244,0.1);
      stroke-width: 7;
    }

    .ring-prog {
      fill: none;
      stroke: #f38ba8;
      stroke-width: 7;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.4s;
    }

    body.mode-break .ring-prog { stroke: #a6e3a1; }
    body.mode-long  .ring-prog { stroke: #fab387; }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .time-text {
      font-size: clamp(20px, 8vw, 38px);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      color: #cdd6f4;
    }

    .mode-text {
      font-size: clamp(7px, 2vw, 10px);
      color: rgba(205,214,244,0.45);
      letter-spacing: 1.5px;
      margin-top: 3px;
    }

    /* ===== ボタン行 ===== */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s, opacity 0.12s;
      flex-shrink: 0;
    }

    .btn:active { transform: scale(0.88); }

    .btn-main {
      width: clamp(34px, 10vw, 46px);
      height: clamp(34px, 10vw, 46px);
      background: #f38ba8;
      font-size: clamp(14px, 4vw, 20px);
      box-shadow: 0 2px 10px rgba(243,139,168,0.45);
    }

    body.mode-break .btn-main { background: #a6e3a1; box-shadow: 0 2px 10px rgba(166,227,161,0.45); }
    body.mode-long  .btn-main { background: #fab387; box-shadow: 0 2px 10px rgba(250,179,135,0.45); }

    .btn-sub {
      width: clamp(26px, 7vw, 34px);
      height: clamp(26px, 7vw, 34px);
      background: rgba(205,214,244,0.1);
      font-size: clamp(10px, 3vw, 14px);
    }

    .btn-sub:hover { background: rgba(205,214,244,0.2); }

    /* ===== トマト行 ===== */
    .tomatoes {
      display: flex;
      justify-content: center;
      gap: 3px;
      flex-shrink: 0;
      flex-wrap: nowrap;
      overflow: hidden;
      height: 16px;
    }

    .tomato {
      font-size: 11px;
      opacity: 0.2;
      transition: opacity 0.3s, transform 0.3s;
      line-height: 1;
    }

    .tomato.done    { opacity: 1; }
    .tomato.current { opacity: 0.6; animation: pulse 1s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.2); }
    }

    .tomato-extra {
      font-size: 9px;
      color: rgba(205,214,244,0.4);
      align-self: center;
    }

    /* ===== 設定（折りたたみ） ===== */
    .settings-row {
      display: flex;
      justify-content: flex-end;
      padding: 2px 6px 4px;
      flex-shrink: 0;
    }

    .settings-toggle {
      background: none;
      border: none;
      color: rgba(205,214,244,0.25);
      font-size: 11px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .settings-toggle:hover { color: rgba(205,214,244,0.6); }

    .settings-panel {
      display: none;
      background: rgba(0,0,0,0.3);
      padding: 8px;
      flex-shrink: 0;
      border-top: 1px solid rgba(205,214,244,0.08);
    }

    .settings-panel.open { display: block; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .setting-row:last-child { margin-bottom: 0; }

    .setting-row label {
      font-size: 10px;
      color: rgba(205,214,244,0.5);
    }

    .setting-row input[type="number"] {
      width: 46px;
      padding: 2px 4px;
      background: rgba(205,214,244,0.08);
      border: 1px solid rgba(205,214,244,0.15);
      border-radius: 4px;
      color: #cdd6f4;
      font-size: 11px;
      text-align: center;
    }

    .setting-row input[type="number"]:focus {
      outline: none;
      border-color: rgba(205,214,244,0.4);
    }

    /* ===== トースト ===== */
    .toast {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%) translateY(50px);
      background: rgba(30,30,46,0.92);
      border: 1px solid rgba(205,214,244,0.15);
      color: #cdd6f4;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ===== 使い方ヒント（初回のみ） ===== */
    .hint {
      font-size: 9px;
      color: rgba(205,214,244,0.2);
      text-align: center;
      padding: 0 4px 3px;
      flex-shrink: 0;
    }
  </style>
</head>
<body class="mode-work">

  <!-- モード切替バー -->
  <div class="mode-bar">
    <button class="mode-tab active" data-mode="work"  onclick="switchMode('work')">作業</button>
    <button class="mode-tab"       data-mode="break"  onclick="switchMode('break')">休憩</button>
    <button class="mode-tab"       data-mode="long"   onclick="switchMode('long')">長休憩</button>
  </div>

  <!-- タイマー中央エリア -->
  <div class="timer-area">
    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 100 100">
        <circle class="ring-track" cx="50" cy="50" r="44"/>
        <circle class="ring-prog"  cx="50" cy="50" r="44"
                stroke-dasharray="276.46"
                stroke-dashoffset="0"
                id="progress-ring"/>
      </svg>
      <div class="ring-center">
        <div class="time-text" id="timer-display">25:00</div>
        <div class="mode-text" id="mode-label">FOCUS</div>
      </div>
    </div>

    <!-- ボタン -->
    <div class="controls">
      <button class="btn btn-sub" onclick="resetTimer()" title="リセット (R)">⏮</button>
      <button class="btn btn-main" id="start-btn" onclick="toggleTimer()" title="開始/停止 (Space)">▶</button>
      <button class="btn btn-sub" onclick="skipSession()" title="スキップ">⏭</button>
    </div>

    <!-- トマト -->
    <div class="tomatoes" id="tomatoes"></div>
  </div>

  <!-- 設定 -->
  <div class="settings-row">
    <button class="settings-toggle" onclick="toggleSettings()">⚙</button>
  </div>
  <div class="settings-panel" id="settings-panel">
    <div class="setting-row">
      <label>作業（分）</label>
      <input type="number" id="set-work"  min="1" max="60" value="25" onchange="applySettings()">
    </div>
    <div class="setting-row">
      <label>短い休憩（分）</label>
      <input type="number" id="set-break" min="1" max="30" value="5"  onchange="applySettings()">
    </div>
    <div class="setting-row">
      <label>長い休憩（分）</label>
      <input type="number" id="set-long"  min="1" max="60" value="15" onchange="applySettings()">
    </div>
  </div>

  <p class="hint">Space: 開始/停止 &nbsp; R: リセット</p>

  <!-- トースト -->
  <div class="toast" id="toast"></div>

  <script>
    const MODES = {
      work:  { label: 'FOCUS',       bodyClass: 'mode-work'  },
      break: { label: 'SHORT BREAK', bodyClass: 'mode-break' },
      long:  { label: 'LONG BREAK',  bodyClass: 'mode-long'  },
    };

    let settings     = { work: 25, break: 5, long: 15 };
    let currentMode  = 'work';
    let totalSec     = settings.work * 60;
    let remainSec    = totalSec;
    let isRunning    = false;
    let interval     = null;
    let doneCount    = 0;
    const MAX_T      = 8;
    const CIRC       = 276.46;

    const dispEl   = document.getElementById('timer-display');
    const labelEl  = document.getElementById('mode-label');
    const ringEl   = document.getElementById('progress-ring');
    const startBtn = document.getElementById('start-btn');
    const tomatoEl = document.getElementById('tomatoes');
    const toastEl  = document.getElementById('toast');

    function init() { renderTomatoes(); updateDisplay(); }

    function switchMode(mode) {
      stop();
      currentMode = mode;
      totalSec    = settings[mode] * 60;
      remainSec   = totalSec;
      document.querySelectorAll('.mode-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.mode === mode));
      document.body.className = MODES[mode].bodyClass;
      labelEl.textContent     = MODES[mode].label;
      updateDisplay();
    }

    function toggleTimer() { isRunning ? pause() : start(); }

    function start() {
      isRunning = true;
      startBtn.textContent = '⏸';
      interval = setInterval(tick, 1000);
    }

    function pause() {
      isRunning = false;
      startBtn.textContent = '▶';
      clearInterval(interval);
    }

    function stop() {
      pause();
      remainSec = totalSec;
    }

    function resetTimer() {
      stop();
      updateDisplay();
      showToast('リセット');
    }

    function skipSession() { stop(); onComplete(false); }

    function tick() {
      remainSec--;
      updateDisplay();
      if (remainSec <= 0) onComplete(true);
    }

    function onComplete(auto) {
      stop();
      if (currentMode === 'work') {
        doneCount++;
        renderTomatoes();
        playBell();
        const long = doneCount % 4 === 0;
        if (auto) showToast(long ? `${doneCount}個完了！長い休憩へ` : `完了！休憩しましょう`);
        setTimeout(() => switchMode(long ? 'long' : 'break'), 500);
      } else {
        if (auto) { playBell(); showToast('休憩終了！'); }
        setTimeout(() => switchMode('work'), 500);
      }
    }

    function updateDisplay() {
      const m = Math.floor(remainSec / 60);
      const s = remainSec % 60;
      dispEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      const offset = CIRC * (1 - remainSec / totalSec);
      ringEl.style.strokeDashoffset = offset;
    }

    function renderTomatoes() {
      tomatoEl.innerHTML = '';
      const show = Math.min(Math.max(MAX_T, doneCount + 1), MAX_T);
      for (let i = 0; i < show; i++) {
        const s = document.createElement('span');
        s.className = 'tomato';
        s.textContent = '🍅';
        if (i < doneCount)                                 s.classList.add('done');
        else if (i === doneCount && currentMode === 'work') s.classList.add('current');
        tomatoEl.appendChild(s);
      }
      if (doneCount > MAX_T) {
        const e = document.createElement('span');
        e.className = 'tomato-extra';
        e.textContent = `+${doneCount - MAX_T}`;
        tomatoEl.appendChild(e);
      }
    }

    function toggleSettings() {
      document.getElementById('settings-panel').classList.toggle('open');
    }

    function applySettings() {
      settings.work  = parseInt(document.getElementById('set-work').value)  || 25;
      settings.break = parseInt(document.getElementById('set-break').value) || 5;
      settings.long  = parseInt(document.getElementById('set-long').value)  || 15;
      switchMode(currentMode);
      showToast('設定を保存');
    }

    let toastT;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastT);
      toastT = setTimeout(() => toastEl.classList.remove('show'), 2500);
    }

    function playBell() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.15, 0.3].forEach(d => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = 880; o.type = 'sine';
          g.gain.setValueAtTime(0.35, ctx.currentTime + d);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 0.8);
          o.start(ctx.currentTime + d);
          o.stop(ctx.currentTime + d + 0.8);
        });
      } catch(e) {}
    }

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); toggleTimer(); }
      if (e.code === 'KeyR')  resetTimer();
    });

    init();
  </script>
</body>
</html>

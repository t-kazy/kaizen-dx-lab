# Dify チャットフロー DSL
# カテゴリ選択型ナレッジ検索
#
# フロー: Start → LLM → Answer（カテゴリ選択付き）
#
# インポート後の設定手順:
#   1. LLMノードでモデルを選択（例: gpt-4o, claude-sonnet 等）
#   2. 必要に応じてナレッジ検索ノードを追加し、LLMのコンテキストに接続
#   3. カテゴリ別にルーティングしたい場合は、IF/ELSEノードを追加
#   4. デバッグモードでテスト

app:
  description: '13カテゴリから選択して、該当ナレッジを検索・回答するチャットフロー'
  icon: "\U0001F50D"
  icon_background: '#E4FBCC'
  mode: advanced-chat
  name: "\u696D\u52D9\u30CA\u30EC\u30C3\u30B8\u691C\u7D22\u30C1\u30E3\u30C3\u30C8\uFF08\u30AB\u30C6\u30B4\u30EA\u9078\u629E\u578B\uFF09"

workflow:
  features:
    file_upload:
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
    opening_statement: "\u30AB\u30C6\u30B4\u30EA\u3092\u9078\u629E\u3057\u3066\u8CEA\u554F\u3057\u3066\u304F\u3060\u3055\u3044\u3002"
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        sourceType: start
        targetType: llm
      id: '1000-source-4000-target'
      source: '1000'
      sourceHandle: source
      target: '4000'
      targetHandle: target
      type: custom
    - data:
        sourceType: llm
        targetType: answer
      id: '4000-source-5000-target'
      source: '4000'
      sourceHandle: source
      target: '5000'
      targetHandle: target
      type: custom
    nodes:
    - data:
        desc: ''
        selected: false
        title: "\u958B\u59CB"
        type: start
        variables:
        - label: "\u30AB\u30C6\u30B4\u30EA\u3092\u9078\u629E\u3057\u3066\u304F\u3060\u3055\u3044"
          options:
          - "\u5168\u4F53"
          - "\u9001\u8FCE(\u884C\u304D)"
          - "\u6765\u6240\u6642"
          - "\u5BBF\u984C"
          - "\u304A\u3084\u3064\u30FB\u98DF\u4E8B\u63D0\u4F9B"
          - "\u904A\u3073(\u81EA\u7531\u6642\u9593)"
          - "\u306F\u3058\u307E\u308A\u306E\u4F1A"
          - "\u6D3B\u52D5"
          - "\u304A\u308F\u308A\u306E\u4F1A"
          - "\u9001\u8FCE(\u5E30\u308A)"
          - "\u6D3B\u52D5\u6E96\u5099"
          - "\u6383\u9664\u30FB\u70B9\u691C"
          - "\u6D3B\u52D5\u8A18\u9332"
          required: true
          type: select
          variable: category
      height: 90
      id: '1000'
      position:
        x: 80
        y: 282
      positionAbsolute:
        x: 80
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        context:
          enabled: false
          variable_selector: []
        desc: ''
        model:
          completion_params:
            temperature: 0.3
            max_tokens: 2048
          mode: chat
          name: ''
          provider: ''
        prompt_template:
        - role: system
          text: "あなたは業務ナレッジに基づいて質問に回答するアシスタントです。\nユーザーは「{{#1000.category#}}」カテゴリについて質問しています。\n\n## ルール\n1. 提供されたコンテキスト情報のみに基づいて回答してください\n2. コンテキストに該当する情報がない場合は「選択されたカテゴリ内に該当する情報が見つかりませんでした。別のカテゴリを選択するか、質問を変えてお試しください。」と伝えてください\n3. 回答の根拠となるセクション名を【参照元】として明示してください\n4. 推測や外部知識による補完は行わないでください\n5. 箇条書きや表を使って分かりやすく回答してください\n\n## コンテキスト情報\n{{#context#}}"
        - role: user
          text: '{{#sys.query#}}'
        selected: false
        title: "\u56DE\u7B54\u751F\u6210"
        type: llm
        variables: []
        vision:
          enabled: false
      height: 98
      id: '4000'
      position:
        x: 380
        y: 282
      positionAbsolute:
        x: 380
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        answer: '{{#4000.text#}}'
        desc: ''
        selected: false
        title: "\u56DE\u7B54"
        type: answer
      height: 90
      id: '5000'
      position:
        x: 680
        y: 282
      positionAbsolute:
        x: 680
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    viewport:
      x: 0
      y: 0
      zoom: 1
